<svg xmlns="http://www.w3.org/2000/svg" width="1366" height="768" viewBox="0 0 1366 768" role="img" aria-labelledby="title desc">
  <title id="title">Poster G-KOIN NU Peduli</title>
  <desc id="desc">Poster edukasi gerakan sedekah G-KOIN NU Peduli.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f3f4f6" />
    </linearGradient>
  </defs>

  <rect width="1366" height="768" fill="url(#bg)" />

  <rect x="0" y="0" width="1366" height="86" fill="#0f6e3a" />
  <rect x="0" y="86" width="1366" height="58" fill="#12a34a" />
  <text x="683" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#071f12">
    Apapun Aktivitas Anda Mulailah Dengan Sedekah
  </text>
  <text x="683" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#04180d">
